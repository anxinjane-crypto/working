id: sustainability-dashboard
name: 永續打卡看板 index.html
type: html
content: |-
  <!DOCTYPE html>
  <html lang="zh-TW">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>永續打卡看板</title>
  <style>
  :root{
    --primary:#2563eb;--primary-dark:#1d4ed8;
    --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
    --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
    --text:#1e293b;--muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}

  /* ── Header ── */
  .hdr{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;
       padding:.875rem 1.5rem;position:sticky;top:0;z-index:200;
       box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .hdr-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;
             justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
  .logo{display:flex;align-items:center;gap:.625rem;font-size:1.125rem;font-weight:700;}
  .hdr-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
  .lang-sw{display:flex;background:rgba(255,255,255,.15);border-radius:8px;padding:3px;}
  .lang-btn{padding:.3rem .75rem;border:none;background:transparent;color:#fff;
            cursor:pointer;border-radius:6px;font-size:.8125rem;font-weight:600;}
  .lang-btn.on{background:#fff;color:var(--primary);}
  .chip{background:rgba(255,255,255,.15);border:none;color:#fff;
        padding:.375rem .875rem;border-radius:20px;font-size:.8125rem;cursor:pointer;}
  .chip:hover{background:rgba(255,255,255,.25);}

  /* ── Layout ── */
  .wrap{max-width:1440px;margin:0 auto;padding:1.5rem 1rem;}

  /* ── Stats ── */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
         gap:1rem;margin-bottom:1.75rem;}
  .stat{background:var(--card);border-radius:12px;padding:1.125rem 1.25rem;
        box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:center;gap:1rem;}
  .stat-ico{width:44px;height:44px;border-radius:10px;display:flex;
            align-items:center;justify-content:center;font-size:1.375rem;flex-shrink:0;}
  .stat-val{font-size:1.625rem;font-weight:800;line-height:1;}
  .stat-lbl{font-size:.6875rem;color:var(--muted);margin-top:.25rem;}

  /* ── Tabs ── */
  .tabs{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.375rem;margin-bottom:1.25rem;}
  .tab{padding:.625rem 1.25rem;border:2px solid var(--border);background:var(--card);
       color:var(--muted);border-radius:10px;cursor:pointer;font-weight:600;
       font-size:.875rem;white-space:nowrap;transition:all .18s;}
  .tab:hover{border-color:var(--primary);}
  .tab.on{background:var(--primary);color:#fff;border-color:var(--primary);}
  .sub-row{display:flex;gap:.375rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
  .stab{padding:.4375rem .875rem;border:1.5px solid var(--border);background:var(--card);
        color:var(--muted);border-radius:8px;cursor:pointer;font-weight:600;
        font-size:.8125rem;transition:all .18s;}
  .stab:hover{border-color:var(--primary);}
  .stab.on{background:#eff6ff;color:var(--primary);border-color:var(--primary);}
  .add-tab{padding:.4375rem .875rem;border:2px dashed var(--border);background:transparent;
           color:var(--muted);border-radius:8px;cursor:pointer;font-size:.8125rem;font-weight:600;}
  .add-tab:hover{border-color:var(--success);color:var(--success);}

  /* ── Table Card ── */
  .tcard{background:var(--card);border-radius:12px;
         box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;margin-bottom:1.25rem;}
  .tcard-hdr{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);
             display:flex;justify-content:space-between;align-items:center;background:#f8fafc;}
  .tcard-title{font-weight:700;font-size:.9375rem;}
  .tscroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{background:#f8fafc;padding:.75rem 1rem;text-align:left;font-size:.6875rem;
     font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:.875rem 1rem;border-bottom:1px solid #f1f5f9;font-size:.8125rem;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr.done-row{background:#f0fdf4;}
  tr.remind-row{background:#fffbeb;border-left:3px solid var(--warning);}

  /* ── Editable ── */
  .ed{border:1px solid transparent;border-radius:6px;padding:.4375rem .5rem;
      background:transparent;width:100%;min-width:80px;font-size:.8125rem;
      resize:none;overflow:hidden;font-family:inherit;line-height:1.5;}
  .ed:hover{border-color:var(--border);}
  .ed:focus{outline:none;border-color:var(--primary);background:#fff;}

  /* ── Buttons ── */
  .btn{padding:.5rem 1rem;border:none;border-radius:8px;font-size:.8125rem;
       font-weight:600;cursor:pointer;display:inline-flex;align-items:center;
       gap:.375rem;transition:all .18s;white-space:nowrap;}
  .btn-p{background:var(--primary);color:#fff;}
  .btn-p:hover{background:var(--primary-dark);}
  .btn-s{background:var(--success);color:#fff;}
  .btn-s:hover{background:#059669;}
  .btn-d{background:var(--danger);color:#fff;}
  .btn-d:hover{background:#dc2626;}
  .btn-g{background:#f1f5f9;color:#475569;}
  .btn-g:hover{background:#e2e8f0;}
  .btn-sup{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;
            border:1.5px solid #f59e0b;}
  .btn-sup:hover{background:linear-gradient(135deg,#fde68a,#fcd34d);}
  .btn-sup.ck{background:linear-gradient(135deg,#dbeafe,#bfdbfe);
              color:#1e40af;border-color:#3b82f6;}

  /* ── Check-in cell ── */
  .ci-cell{display:flex;flex-direction:column;gap:.375rem;min-width:150px;}
  .ci-btn{padding:.5625rem .875rem;border:none;border-radius:8px;font-size:.8125rem;
          font-weight:700;cursor:pointer;width:100%;
          background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;transition:all .18s;}
  .ci-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3);}
  .ci-done{background:#dcfce7;color:#166534;padding:.4375rem .75rem;
           border-radius:8px;font-size:.75rem;font-weight:600;}
  .ci-by{font-size:.6875rem;opacity:.75;margin-top:.125rem;}

  /* ── Badges ── */
  .badge{display:inline-flex;align-items:center;padding:.25rem .625rem;
         border-radius:10px;font-size:.6875rem;font-weight:700;}
  .b-ok{background:#dcfce7;color:#166534;}
  .b-warn{background:#fef3c7;color:#92400e;}
  .b-err{background:#fee2e2;color:#991b1b;}
  .b-gray{background:#f1f5f9;color:#64748b;}
  .src-tag{display:inline-flex;align-items:center;background:#fef3c7;color:#92400e;
           padding:.1875rem .5rem;border-radius:5px;font-size:.6875rem;margin-left:.375rem;}

  /* ── Modal ── */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
           z-index:500;align-items:center;justify-content:center;padding:1rem;}
  .overlay.show{display:flex;}
  .mbox{background:#fff;border-radius:16px;padding:1.75rem;width:100%;
        max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .mtitle{font-size:1.125rem;font-weight:800;margin-bottom:1.25rem;}
  .fg{margin-bottom:.875rem;}
  .flbl{display:block;font-size:.8125rem;font-weight:600;color:var(--muted);margin-bottom:.3125rem;}
  .finp,.fsel{width:100%;padding:.6875rem .875rem;border:1.5px solid var(--border);
              border-radius:8px;font-size:.875rem;font-family:inherit;}
  .finp:focus,.fsel:focus{outline:none;border-color:var(--primary);}
  .mact{display:flex;gap:.625rem;justify-content:flex-end;margin-top:1.25rem;}

  /* ── Toast ── */
  .toast{position:fixed;bottom:1.75rem;right:1.75rem;background:#1e293b;color:#fff;
         padding:.875rem 1.375rem;border-radius:12px;font-size:.875rem;font-weight:600;
         transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;max-width:360px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.ok{background:#065f46;}
  .toast.err{background:#991b1b;}

  /* ── Login ── */
  .login-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:1.5rem;}
  .login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;
             max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
  .login-ico{font-size:3.5rem;margin-bottom:.75rem;}
  .login-title{font-size:1.625rem;font-weight:800;margin-bottom:.375rem;}
  .login-sub{font-size:.875rem;color:var(--muted);margin-bottom:1.75rem;}
  .login-inp{width:100%;padding:.8125rem 1rem;border:1.5px solid var(--border);
             border-radius:10px;font-size:.875rem;margin-bottom:.875rem;font-family:inherit;}
  .login-inp:focus{outline:none;border-color:var(--primary);}
  .login-btn{width:100%;padding:.9375rem;background:var(--primary);color:#fff;
             border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;}
  .login-btn:hover{background:var(--primary-dark);}
  .login-err{color:var(--danger);font-size:.8125rem;min-height:1.25rem;margin-bottom:.75rem;}

  /* ── History ── */
  .hist-list{max-height:380px;overflow-y:auto;}
  .hist-item{padding:.625rem .875rem;border-bottom:1px solid var(--border);font-size:.8125rem;}
  .hist-item:last-child{border-bottom:none;}

  /* ── Spinner ── */
  .spin-wrap{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);}
  .spinner{width:36px;height:36px;border:4px solid var(--border);
           border-top-color:var(--primary);border-radius:50%;animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:640px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .hdr-inner{flex-direction:column;align-items:stretch;}
    .hdr-right{justify-content:space-between;}
  }
  </style>
  </head>
  <body>

  <!-- ══════════════ LOGIN ══════════════ -->
  <div id="loginPg" class="login-pg">
    <div class="login-box">
      <div class="login-ico">🌿</div>
      <div class="login-title">永續打卡看板</div>
      <div class="login-sub">Sustainability Check-in Dashboard</div>
      <input id="inpUrl"  class="login-inp" placeholder="🔗 Google Apps Script URL">
      <input id="inpUser" class="login-inp" placeholder="👤 您的名字 Your Name">
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" onclick="login()">🚀 開始使用 Start</button>
    </div>
  </div>

  <!-- ══════════════ APP ══════════════ -->
  <div id="appPg" style="display:none;">
    <div class="hdr">
      <div class="hdr-inner">
        <div class="logo">🌿 <span id="hdrTitle">永續打卡看板</span></div>
        <div class="hdr-right">
          <div class="lang-sw">
            <button class="lang-btn on" data-l="zh" onclick="setLang('zh')">中文</button>
            <button class="lang-btn"    data-l="en" onclick="setLang('en')">EN</button>
          </div>
          <span class="chip" id="hdrUser"></span>
          <button class="chip" onclick="loadData()">🔄</button>
          <button class="chip" onclick="logout()">登出</button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-ico" style="background:#dcfce7">✅</div>
          <div><div class="stat-val" id="sCompleted">0</div>
               <div class="stat-lbl" id="lCompleted">已完成</div></div>
        </div>
        <div class="stat">
          <div class="stat-ico" style="background:#fef3c7">⏳</div>
          <div><div class="stat-val" id="sPending">0</div>
               <div class="stat-lbl" id="lPending">待處理</div></div>
        </div>
        <div class="stat">
          <div class="stat-ico" style="background:#fee2e2">🔔</div>
          <div><div class="stat-val" id="sRemind">0</div>
               <div class="stat-lbl" id="lRemind">5天內到期</div></div>
        </div>
        <div class="stat">
          <div class="stat-ico" style="background:#dbeafe">🛡️</div>
          <div><div class="stat-val" id="sSuper">0</div>
               <div class="stat-lbl" id="lSuper">主管已確認</div></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs"    id="mainTabs"></div>
      <div class="sub-row" id="subTabs"></div>
      <div id="tableArea"></div>
    </div>
  </div>

  <!-- ══════════════ MODALS ══════════════ -->
  <!-- Add Category -->
  <div class="overlay" id="mAddCat">
    <div class="mbox">
      <div class="mtitle">➕ 新增分頁 Add Tab</div>
      <div class="fg"><label class="flbl">中文名稱</label>
        <input id="cZh" class="finp" placeholder="例如：Tiger"></div>
      <div class="fg"><label class="flbl">English Name</label>
        <input id="cEn" class="finp" placeholder="e.g. Tiger"></div>
      <div class="mact">
        <button class="btn btn-g" onclick="closeM('mAddCat')">取消</button>
        <button class="btn btn-s" onclick="submitCat()">✅ 新增</button>
      </div>
    </div>
  </div>

  <!-- Add Item -->
  <div class="overlay" id="mAddItem">
    <div class="mbox">
      <div class="mtitle">➕ 新增項目 Add Item</div>
      <div class="fg"><label class="flbl">項目名稱 Item Name</label>
        <input id="iName" class="finp"></div>
      <div class="fg"><label class="flbl">檢查人 Checker</label>
        <input id="iChecker" class="finp"></div>
      <div class="fg"><label class="flbl">負責人 Responsible</label>
        <input id="iResp" class="finp"></div>
      <div class="fg"><label class="flbl">更新頻率 Frequency</label>
        <input id="iFreq" class="finp" placeholder="例如：每週一 Every Monday"></div>
      <div class="fg"><label class="flbl">到期日期 Due Date</label>
        <input id="iDue" class="finp" placeholder="2026/04/14 17:00"></div>
      <div class="mact">
        <button class="btn btn-g" onclick="closeM('mAddItem')">取消</button>
        <button class="btn btn-s" onclick="submitItem()">✅ 新增</button>
      </div>
    </div>
  </div>

  <!-- Supervisor -->
  <div class="overlay" id="mSup">
    <div class="mbox">
      <div class="mtitle">🛡️ 主管確認 Supervisor Check</div>
      <div class="fg"><label class="flbl">主管密碼 Password</label>
        <input type="password" id="supPwd" class="finp" placeholder="預設 admin123"></div>
      <div class="mact">
        <button class="btn btn-g" onclick="closeM('mSup')">取消</button>
        <button class="btn btn-s" onclick="submitSup()">✅ 確認</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="overlay" id="mHist">
    <div class="mbox">
      <div class="mtitle">📜 打卡歷史 Check-in History</div>
      <div class="hist-list" id="histList"></div>
      <div class="mact">
        <button class="btn btn-g" onclick="closeM('mHist')">關閉 Close</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ══════════════ SCRIPT ══════════════ -->
  <script>
  // ── i18n ──────────────────────────────────────────────────
  const T18={
    zh:{
      title:'永續打卡看板',
      lCompleted:'已完成',lPending:'待處理',lRemind:'5天內到期',lSuper:'主管已確認',
      thCheckIn:'打卡',thName:'項目名稱',thChecker:'檢查人',thResp:'負責人',
      thFreq:'更新頻率',thDue:'到期日期',thRecord:'打卡紀錄',thHist:'歷史',
      thSup:'主管確認',thAct:'操作',
      btnCheckIn:'打卡',btnChecked:'已確認',btnNotChecked:'待確認',
      from:'來自',daysLeft:'天後到期',noItems:'暫無項目',
      okCheckIn:'✅ 打卡成功！',okSup:'🛡️ 主管確認成功！',
      okDel:'🗑️ 刪除成功',okAdd:'✅ 新增成功',okUpdate:'💾 更新成功',
      errPwd:'❌ 密碼錯誤',errLoad:'❌ 載入失敗',
      addItem:'➕ 新增項目 Add Item',addTab:'➕ 新增分頁 Add Tab',
      noHist:'暫無歷史記錄'
    },
    en:{
      title:'Sustainability Check-in Dashboard',
      lCompleted:'COMPLETED',lPending:'PENDING',lRemind:'DUE IN 5 DAYS',lSuper:'SUPERVISED',
      thCheckIn:'Check-in',thName:'Item Name',thChecker:'Checker',thResp:'Responsible',
      thFreq:'Frequency',thDue:'Due Date',thRecord:'Record',thHist:'History',
      thSup:'Supervisor',thAct:'Actions',
      btnCheckIn:'Check-in',btnChecked:'Checked',btnNotChecked:'Pending',
      from:'From',daysLeft:'days left',noItems:'No items',
      okCheckIn:'✅ Check-in successful!',okSup:'🛡️ Supervisor check done!',
      okDel:'🗑️ Deleted',okAdd:'✅ Added',okUpdate:'💾 Updated',
      errPwd:'❌ Wrong password',errLoad:'❌ Load failed',
      addItem:'➕ Add Item',addTab:'➕ Add Tab',
      noHist:'No history'
    }
  };
  let LANG='zh';
  const t=k=>T18[LANG][k]||k;

  // ── State ─────────────────────────────────────────────────
  let API='',USER='';
  let cats=[],items=[],reminders=[];
  let curMain='',curSub='',pendingSupId='';

  // ── Init ──────────────────────────────────────────────────
  (function(){
    const u=localStorage.getItem('api'),n=localStorage.getItem('user');
    if(u&&n){
      API=u;USER=n;
      document.getElementById('inpUrl').value=u;
      showApp();loadData();
    }
  })();

  function login(){
    const u=document.getElementById('inpUrl').value.trim();
    const n=document.getElementById('inpUser').value.trim();
    const err=document.getElementById('loginErr');
    if(!u||!n){err.textContent='⚠️ 請填寫所有欄位';return;}
    API=u;USER=n;
    localStorage.setItem('api',u);localStorage.setItem('user',n);
    showApp();loadData();
  }
  function logout(){localStorage.clear();location.reload();}
  function showApp(){
    document.getElementById('loginPg').style.display='none';
    document.getElementById('appPg').style.display='block';
    document.getElementById('hdrUser').textContent='👤 '+USER;
  }

  // ── Lang ──────────────────────────────────────────────────
  function setLang(l){
    LANG=l;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
    document.getElementById('hdrTitle').textContent=t('title');
    document.getElementById('lCompleted').textContent=t('lCompleted');
    document.getElementById('lPending').textContent=t('lPending');
    document.getElementById('lRemind').textContent=t('lRemind');
    document.getElementById('lSuper').textContent=t('lSuper');
    renderTabs();
  }

  // ── API helper ────────────────────────────────────────────
  async function call(params){
    const qs=Object.entries(params)
      .map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(v??'')}`)
      .join('&');
    const r=await fetch(`${API}?${qs}`);
    return r.json();
  }

  // ── Load ──────────────────────────────────────────────────
  async function loadData(){
    document.getElementById('tableArea').innerHTML=
      '<div class="spin-wrap"><div class="spinner"></div></div>';
    try{
      const r=await call({action:'getData'});
      if(!r.success){toast(t('errLoad')+': '+r.error,'err');return;}
      cats=r.categories;
      items=r.items;
      reminders=r.reminders||[];
      updateStats();
      renderTabs();
    }catch(e){
      toast(t('errLoad')+': '+e,'err');
      document.getElementById('tableArea').innerHTML=
        '<div style="text-align:center;padding:3rem;color:#ef4444">❌ 無法連線，請確認 API URL</div>';
    }
  }

  // ── Stats ─────────────────────────────────────────────────
  function updateStats(){
    document.getElementById('sCompleted').textContent=items.filter(i=>i.supCheck==='true').length;
    document.getElementById('sPending').textContent=items.filter(i=>!i.checkIn).length;
    document.getElementById('sRemind').textContent=reminders.length;
    document.getElementById('sSuper').textContent=items.filter(i=>i.supCheck==='true').length;
  }

  // ── Tabs ──────────────────────────────────────────────────
  function renderTabs(){
    const mains=cats.filter(c=>c.type==='main');
    if(!curMain&&mains.length)curMain=mains[0].id;
    const bar=document.getElementById('mainTabs');
    bar.innerHTML='';
    mains.forEach(c=>{
      const el=document.createElement('div');
      el.className='tab'+(c.id===curMain?' on':'');
      el.textContent=LANG==='en'?c.en:c.zh;
      el.onclick=()=>{curMain=c.id;curSub='';renderSubTabs();};
      bar.appendChild(el);
    });
    renderSubTabs();
  }

  function renderSubTabs(){
    const subs=cats.filter(c=>c.type==='sub'&&c.parentId===curMain);
    if(!curSub&&subs.length)curSub=subs[0].id;
    const bar=document.getElementById('subTabs');
    bar.innerHTML='';
    subs.forEach(c=>{
      const el=document.createElement('div');
      el.className='stab'+(c.id===curSub?' on':'');
      el.textContent=LANG==='en'?c.en:c.zh;
      el.onclick=()=>{curSub=c.id;renderTable();};
      bar.appendChild(el);
    });
    const add=document.createElement('button');
    add.className='add-tab';add.textContent=t('addTab');
    add.onclick=()=>openM('mAddCat');
    bar.appendChild(add);
    renderTable();
  }

  // ── Parse date ────────────────────────────────────────────
  function parseDate(s){
    if(!s)return null;
    const m=String(s).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:\s+(\d{1,2}):(\d{2}))?/);
    if(!m)return null;
    return new Date(+m[1],+m[2]-1,+m[3],m[4]?+m[4]:23,m[5]?+m[5]:59);
  }

  // ── Table ─────────────────────────────────────────────────
  function renderTable(){
    const key=curMain+'-'+curSub;

    // 本分頁的項目
    let its=items.filter(i=>i.catKey===key).map(i=>({...i,_remind:false}));

    // 5天提醒插入
    reminders.filter(r=>r.targetKey===key).forEach(r=>{
      const src=items.find(i=>i.id===r.itemId);
      if(src&&!its.find(i=>i.id===r.itemId)){
        its.push({...src,_remind:true,_sourceKey:r.sourceKey,_days:r.daysDiff});
      }
    });

    // 依到期日排序
    its.sort((a,b)=>{
      const da=parseDate(a.dueDate),db=parseDate(b.dueDate);
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
      return da-db;
    });

    const cat=cats.find(c=>c.id===curSub);
    const catName=cat?(LANG==='en'?cat.en:cat.zh):'';

    let h=`<div class="tcard">
      <div class="tcard-hdr">
        <span class="tcard-title">${catName}</span>
        <span style="font-size:.8125rem;color:var(--muted)">${its.length} 項</span>
      </div>
      <div class="tscroll"><table>
      <thead><tr>
        <th>${t('thCheckIn')}</th>
        <th>${t('thName')}</th>
        <th>${t('thChecker')}</th>
        <th>${t('thResp')}</th>
        <th>${t('thFreq')}</th>
        <th>${t('thDue')}</th>
        <th>${t('thRecord')}</th>
        <th>${t('thHist')}</th>
        <th>${t('thSup')}</th>
        <th>${t('thAct')}</th>
      </tr></thead><tbody>`;

    if(!its.length){
      h+=`<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted)">${t('noItems')}</td></tr>`;
    }else{
      its.forEach(item=>{
        const done=item.supCheck==='true';
        const rc=done?'done-row':item._remind?'remind-row':'';

        // 到期標籤
        const dueLabel=item._remind
          ?`<span class="badge b-warn">⏰ ${item._days} ${t('daysLeft')}</span><br>`:'';

        // 來源標籤
        const srcLabel=item._remind
          ?`<span class="src-tag">📌 ${t('from')} ${catLabel(item._sourceKey)}</span>`:'';

        // 名稱欄
        const nameCell=item._remind
          ?`${item.name}${srcLabel}`
          :`<textarea class="ed" rows="1"
              onblur="upd('${item.id}','name',this.value)"
              oninput="ar(this)">${esc(item.name)}</textarea>`;

        // 打卡欄
        const ciCell=item.checkIn
          ?`<div class="ci-done">✅ ${item.checkIn.split(' by ')[1]||''}
              <div class="ci-by">${item.checkIn.split(' by ')[0]||''}</div></div>`
          :`<button class="ci-btn" onclick="doCI('${item.id}')">📝 ${t('btnCheckIn')}</button>`;

        h+=`<tr class="${rc}">
          <td><div class="ci-cell">${ciCell}</div></td>
          <td>${nameCell}</td>
          <td>${item._remind?item.checker:`<textarea class="ed" rows="1"
                onblur="upd('${item.id}','checker',this.value)"
                oninput="ar(this)">${esc(item.checker)}</textarea>`}</td>
          <td>${item._remind?item.responsible:`<textarea class="ed" rows="1"
                onblur="upd('${item.id}','responsible',this.value)"
                oninput="ar(this)">${esc(item.responsible)}</textarea>`}</td>
          <td>${item._remind?item.frequency:`<textarea class="ed" rows="1"
                onblur="upd('${item.id}','frequency',this.value)"
                oninput="ar(this)">${esc(item.frequency)}</textarea>`}</td>
          <td>${dueLabel}${item._remind?item.dueDate:`<textarea class="ed" rows="1"
                onblur="upd('${item.id}','dueDate',this.value)"
                oninput="ar(this)">${esc(item.dueDate)}</textarea>`}</td>
          <td style="font-size:.75rem;color:var(--muted)">${item.checkIn||'—'}</td>
          <td><button class="btn btn-g" onclick="showHist('${item.id}')">📜</button></td>
          <td><button class="btn btn-sup${done?' ck':''}"
                onclick="openSup('${item.id}')">
                ${done?'✅ '+t('btnChecked'):'🛡️ '+t('btnNotChecked')}</button></td>
          <td>${item._remind
            ?`<span class="badge b-warn">📌</span>`
            :`<button class="btn btn-d" onclick="delItem('${item.id}')">🗑️</button>`}</td>
        </tr>`;
      });
    }

    h+=`</tbody></table></div></div>
      <button class="btn btn-s" onclick="openM('mAddItem')">${t('addItem')}</button>`;
    document.getElementById('tableArea').innerHTML=h;
  }

  function catLabel(key){
    if(!key)return key;
    const parts=key.split('-');
    const main=cats.find(c=>c.id===parts[0]);
    const sub=cats.find(c=>c.id===parts.slice(0,2).join('-')||c.id===parts[1]);
    return [main,sub].filter(Boolean).map(c=>LANG==='en'?c.en:c.zh).join(' › ');
  }

  function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

  // ── Check-in ──────────────────────────────────────────────
  async function doCI(id){
    try{
      const r=await call({action:'checkIn',itemId:id,user:USER});
      if(!r.success){toast(r.error,'err');return;}
      const it=items.find(i=>i.id===id);
      if(it)it.checkIn=r.timestamp+' by '+r.user;
      updateStats();renderTable();toast(t('okCheckIn'),'ok');
    }catch(e){toast(String(e),'err');}
  }

  // ── Update field ──────────────────────────────────────────
  async function upd(id,field,val){
    const it=items.find(i=>i.id===id);
    if(!it||it[field]===val)return;
    try{
      const r=await call({action:'updateItem',itemId:id,field,value:val});
      if(!r.success){toast(r.error,'err');return;}
      it[field]=val;
      toast(t('okUpdate'),'ok');
      if(field==='dueDate')loadData();
    }catch(e){toast(String(e),'err');}
  }

  // ── Supervisor ────────────────────────────────────────────
  function openSup(id){pendingSupId=id;document.getElementById('supPwd').value='';openM('mSup');}
  async function submitSup(){
    const pwd=document.getElementById('supPwd').value;
    closeM('mSup');
    try{
      const r=await call({action:'supervisorCheck',itemId:pendingSupId,password:pwd});
      if(!r.success){toast(t('errPwd'),'err');return;}
      const it=items.find(i=>i.id===pendingSupId);
      if(it){it.supCheck=r.newStatus;it.supTime=r.timestamp;}
      updateStats();renderTable();toast(t('okSup'),'ok');
    }catch(e){toast(String(e),'err');}
  }

  // ── History ───────────────────────────────────────────────
  async function showHist(id){
    try{
      const r=await call({action:'getHistory',itemId:id});
      if(!r.success){toast(r.error,'err');return;}
      const el=document.getElementById('histList');
      el.innerHTML=r.history&&r.history.length
        ?r.history.map(h=>`<div class="hist-item">${esc(h)}</div>`).join('')
        :`<div style="text-align:center;padding:1.5rem;color:var(--muted)">${t('noHist')}</div>`;
      openM('mHist');
    }catch(e){toast(String(e),'err');}
  }

  // ── Delete item ───────────────────────────────────────────
  async function delItem(id){
    if(!confirm('確定刪除？Delete this item?'))return;
    try{
      const r=await call({action:'deleteItem',itemId:id});
      if(!r.success){toast(r.error,'err');return;}
      items=items.filter(i=>i.id!==id);
      updateStats();renderTable();toast(t('okDel'),'ok');
    }catch(e){toast(String(e),'err');}
  }

  // ── Add item ──────────────────────────────────────────────
  async function submitItem(){
    const name=document.getElementById('iName').value.trim();
    if(!name){toast('請輸入項目名稱','err');return;}
    const key=curMain+'-'+curSub;
    try{
      const r=await call({
        action:'addItem',categoryKey:key,
        name,
        checker:document.getElementById('iChecker').value.trim(),
        responsible:document.getElementById('iResp').value.trim(),
        frequency:document.getElementById('iFreq').value.trim(),
        dueDate:document.getElementById('iDue').value.trim()
      });
      if(!r.success){toast(r.error,'err');return;}
      closeM('mAddItem');
      toast(t('okAdd'),'ok');
      loadData();
    }catch(e){toast(String(e),'err');}
  }

  // ── Add category ──────────────────────────────────────────
  async function submitCat(){
    const zh=document.getElementById('cZh').value.trim();
    const en=document.getElementById('cEn').value.trim();
    if(!zh){toast('請輸入名稱','err');return;}
    const id=curMain+'-'+(en||zh).toLowerCase().replace(/\s+/g,'-');
    try{
      const r=await call({action:'addCategory',id,parentId:curMain,zh,en,type:'sub'});
      if(!r.success){toast(r.error,'err');return;}
      closeM('mAddCat');
      toast(t('okAdd'),'ok');
      loadData();
    }catch(e){toast(String(e),'err');}
  }

  // ── Modal ─────────────────────────────────────────────────
  function openM(id){document.getElementById(id).classList.add('show');}
  function closeM(id){document.getElementById(id).classList.remove('show');}
  document.querySelectorAll('.overlay').forEach(o=>{
    o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');});
  });

  // ── Toast ─────────────────────────────────────────────────
  let _tid;
  function toast(msg,type=''){
    const el=document.getElementById('toast');
    el.textContent=msg;el.className='toast '+(type||'');
    void el.offsetWidth;el.classList.add('show');
    clearTimeout(_tid);_tid=setTimeout(()=>el.classList.remove('show'),3000);
  }
  </script>
  </body>
  </html>
