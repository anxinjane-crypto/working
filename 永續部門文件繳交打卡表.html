<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永續部門打卡表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a4731 0%, #2d6a4f 100%);
      min-height: 100vh;
      padding: 30px 16px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1a4731, #2d6a4f);
      color: white;
      padding: 28px 32px;
      text-align: center;
    }
    .header h1 { font-size: 22px; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.8; }
    .header .date-now { font-size: 12px; opacity: 0.7; margin-top: 6px; }

    /* 進度條 */
    .progress-wrap { padding: 18px 32px 0; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #718096; margin-bottom: 6px; }
    .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #48bb78, #2d6a4f); border-radius: 10px; transition: width 0.4s ease; width: 0%; }

    /* 分頁 */
    .tabs { display: flex; padding: 16px 32px 0; gap: 8px; border-bottom: 2px solid #e2e8f0; }
    .tab {
      padding: 9px 22px; border: none; background: none; cursor: pointer;
      font-size: 14px; color: #718096; border-bottom: 3px solid transparent;
      margin-bottom: -2px; border-radius: 4px 4px 0 0; transition: all 0.2s; font-weight: 500;
    }
    .tab:hover { color: #2d6a4f; background: #f0fff4; }
    .tab.active { color: #2d6a4f; border-bottom-color: #2d6a4f; font-weight: 700; }

    .section { display: none; padding: 24px 32px 32px; }
    .section.active { display: block; }

    /* 統計卡片 */
    .stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: white; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; }
    .stat-card .n { font-size: 26px; font-weight: bold; }
    .stat-card .l { font-size: 11px; color: #a0aec0; margin-top: 2px; }
    .stat-card.blue .n { color: #4299e1; }
    .stat-card.green .n { color: #48bb78; }
    .stat-card.red .n { color: #fc8181; }
    .stat-card.orange .n { color: #ed8936; }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { background: #f0fff4; }
    th {
      padding: 11px 12px; text-align: left; font-weight: 700;
      color: #2d6a4f; border-bottom: 2px solid #c6f6d5; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #e2e8f0; transition: background 0.2s; }
    tbody tr:hover { background: #f7fff9; }
    tbody tr.checked-row { background: #f0fff4; }
    tbody tr.overdue-row { background: #fff5f5; }

    td { padding: 10px 12px; vertical-align: middle; }

    /* 打卡格子 */
    .check-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2.5px solid #cbd5e0; background: white;
      cursor: pointer; font-size: 18px; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.25s; color: transparent; margin: auto;
    }
    .check-btn:hover { border-color: #48bb78; background: #f0fff4; }
    .check-btn.checked { background: #48bb78; border-color: #48bb78; color: white; }

    /* 項目名稱 */
    .item-name { font-weight: 600; color: #2d3748; }
    .item-name.done { text-decoration: line-through; color: #a0aec0; }
    .item-sub { font-size: 11px; color: #a0aec0; margin-top: 2px; }

    /* 負責人 */
    .person-badge {
      display: inline-block; padding: 3px 10px;
      background: #ebf8ff; color: #2b6cb0;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid #bee3f8;
    }
    .person-badge:hover { background: #bee3f8; }

    /* 狀態 */
    .status-badge {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
      white-space: nowrap;
    }
    .status-badge.pending { background: #ebf8ff; color: #2b6cb0; }
    .status-badge.ontime { background: #f0fff4; color: #276749; }
    .status-badge.overdue { background: #fff5f5; color: #c53030; }
    .status-badge.upcoming { background: #fffbeb; color: #c05621; }

    /* 打卡時間 */
    .time-cell { font-size: 11.5px; color: #718096; white-space: nowrap; }
    .time-cell.empty { color: #cbd5e0; }

    /* 截止日 */
    .due-cell { font-size: 12px; color: #718096; white-space: nowrap; }
    .due-cell.overdue { color: #c53030; font-weight: bold; }
    .due-cell.soon { color: #c05621; font-weight: bold; }

    /* 刪除 */
    .del-btn { background: none; border: none; color: #e2e8f0; cursor: pointer; font-size: 15px; transition: color 0.2s; }
    .del-btn:hover { color: #fc8181; }

    /* 新增表單 */
    .add-form {
      background: #f0fff4; border: 2px dashed #9ae6b4;
      border-radius: 12px; padding: 16px; margin-top: 16px; display: none;
    }
    .add-form.open { display: block; }
    .add-form h3 { font-size: 13px; color: #2d6a4f; margin-bottom: 10px; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-row input, .form-row select {
      flex: 1; min-width: 110px; padding: 8px 10px;
      border: 1px solid #9ae6b4; border-radius: 8px; font-size: 13px; outline: none;
    }
    .form-row input:focus, .form-row select:focus { border-color: #2d6a4f; }
    .btn-add-confirm {
      padding: 8px 18px; background: #2d6a4f; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-add-confirm:hover { background: #1a4731; }

    /* 底部 */
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 14px; border-top: 1px solid #e2e8f0;
      flex-wrap: wrap; gap: 8px;
    }
    .btn-green {
      padding: 9px 18px; background: #2d6a4f; color: white;
      border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-green:hover { background: #1a4731; }
    .btn-outline-red {
      padding: 9px 18px; background: white; color: #fc8181;
      border: 1.5px solid #fc8181; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-outline-red:hover { background: #fff5f5; }
    .btn-outline-gray {
      padding: 9px 18px; background: white; color: #718096;
      border: 1.5px solid #cbd5e0; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-outline-gray:hover { background: #f7fafc; }

    /* 編輯人名彈窗 */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 24px 28px;
      min-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 16px; color: #2d3748; margin-bottom: 14px; }
    .modal input {
      width: 100%; padding: 10px 12px; border: 1.5px solid #c6f6d5;
      border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .modal input:focus { border-color: #2d6a4f; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
    .btn-confirm { background: #2d6a4f; color: white; }
    .btn-cancel { background: #e2e8f0; color: #718096; }

    .empty-hint { text-align: center; color: #cbd5e0; font-size: 14px; padding: 30px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌿 永續部門文件繳交打卡表</h1>
    <p>Sustainability Department Document Submission Tracker</p>
    <div class="date-now" id="date-now"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">整體完成進度</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('weekly',this)">📅 週報表</button>
    <button class="tab" onclick="switchTab('monthly',this)">📆 月報表</button>
    <button class="tab" onclick="switchTab('quarterly',this)">🗓️ 季報表</button>
  </div>

  <!-- 週報 -->
  <div id="weekly" class="section active">
    <div class="stats" id="weekly-stats"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:44px;text-align:center">打卡</th>
            <th>項目名稱</th>
            <th>負責人</th>
            <th>截止時間</th>
            <th>任務狀態</th>
            <th>打卡時間</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody id="weekly-tbody"></tbody>
      </table>
    </div>
    <div class="add-form" id="weekly-form">
      <h3>➕ 新增週報項目</h3>
      <div class="form-row">
        <input type="text" id="w-name" placeholder="項目名稱（中/英）" />
        <input type="text" id="w-person" placeholder="負責人" />
        <input type="text" id="w-due" placeholder="截止時間（如：每週五 16:00）" />
        <button class="btn-add-confirm" onclick="addItem('weekly')">新增</button>
      </div>
    </div>
    <div class="bottom-bar">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-green" onclick="toggleForm('weekly')">➕ 新增項目</button>
        <button class="btn-outline-gray" onclick="resetSection('weekly')">🔄 重置本週</button>
      </div>
      <button class="btn-outline-red" onclick="clearChecked('weekly')">🗑 清除已完成</button>
    </div>
  </div>

  <!-- 月報 -->
  <div id="monthly" class="section">
    <div class="stats" id="monthly-stats"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:44px;text-align:center">打卡</th>
            <th>項目名稱</th>
            <th>負責人</th>
            <th>截止時間</th>
            <th>任務狀態</th>
            <th>打卡時間</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody id="monthly-tbody"></tbody>
      </table>
    </div>
    <div class="add-form" id="monthly-form">
      <h3>➕ 新增月報項目</h3>
      <div class="form-row">
        <input type="text" id="m-name" placeholder="項目名稱（中/英）" />
        <input type="text" id="m-person" placeholder="負責人" />
        <input type="text" id="m-due" placeholder="截止時間（如：下個月15號）" />
        <button class="btn-add-confirm" onclick="addItem('monthly')">新增</button>
      </div>
    </div>
    <div class="bottom-bar">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-green" onclick="toggleForm('monthly')">➕ 新增項目</button>
        <button class="btn-outline-gray" onclick="resetSection('monthly')">🔄 重置本月</button>
      </div>
      <button class="btn-outline-red" onclick="clearChecked('monthly')">🗑 清除已完成</button>
    </div>
  </div>

  <!-- 季報 -->
  <div id="quarterly" class="section">
    <div class="stats" id="quarterly-stats"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:44px;text-align:center">打卡</th>
            <th>項目名稱</th>
            <th>負責人</th>
            <th>截止時間</th>
            <th>任務狀態</th>
            <th>打卡時間</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody id="quarterly-tbody"></tbody>
      </table>
    </div>
    <div class="add-form" id="quarterly-form">
      <h3>➕ 新增季報項目</h3>
      <div class="form-row">
        <input type="text" id="q-name" placeholder="項目名稱（中/英）" />
        <input type="text" id="q-person" placeholder="負責人" />
        <input type="text" id="q-due" placeholder="截止時間" />
        <button class="btn-add-confirm" onclick="addItem('quarterly')">新增</button>
      </div>
    </div>
    <div class="bottom-bar">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-green" onclick="toggleForm('quarterly')">➕ 新增項目</button>
        <button class="btn-outline-gray" onclick="resetSection('quarterly')">🔄 重置本季</button>
      </div>
      <button class="btn-outline-red" onclick="clearChecked('quarterly')">🗑 清除已完成</button>
    </div>
  </div>
</div>

<!-- 編輯負責人彈窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>✏️ 修改負責人</h3>
    <input type="text" id="modal-input" placeholder="輸入負責人姓名" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmModal()">確認</button>
    </div>
  </div>
</div>

<script>
  // ── 預設資料 ──
  const defaultData = {
    weekly: [
      { id:1,  name:'Working Hours Report', sub:'工時報告', person:'—', due:'每週一 16:00', dueDay:1, dueHour:16, checked:false, time:null },
      { id:2,  name:'Social Plan Report', sub:'社會計畫報告', person:'—', due:'每週五 16:00', dueDay:5, dueHour:16, checked:false, time:null },
      { id:3,  name:'AOK PPT', sub:'', person:'—', due:'每週五 16:00', dueDay:5, dueHour:16, checked:false, time:null },
      { id:4,  name:'AOK Excel', sub:'', person:'—', due:'每週五 16:00', dueDay:5, dueHour:16, checked:false, time:null },
      { id:5,  name:'ESC Sustainability PPT', sub:'', person:'—', due:'每週五 16:00', dueDay:5, dueHour:16, checked:false, time:null },
      { id:6,  name:'ESC Sustainability Excel', sub:'', person:'—', due:'每週五 16:00', dueDay:5, dueHour:16, checked:false, time:null },
      { id:7,  name:'ESC Training PPT', sub:'', person:'—', due:'每週五', dueDay:5, dueHour:23, checked:false, time:null },
      { id:8,  name:'ESC Training Excel', sub:'', person:'—', due:'每週五', dueDay:5, dueHour:23, checked:false, time:null },
    ],
    monthly: [
      { id:10, name:'Labor KPI', sub:'勞工KPI', person:'—', due:'下個月15號', dueDate:15, checked:false, time:null },
      { id:11, name:'Deckers Environmental Format', sub:'環境格式', person:'—', due:'下個月15號', dueDate:15, checked:false, time:null },
      { id:12, name:'H&S KPI Report Format', sub:'健康安全KPI', person:'—', due:'—', dueDate:null, checked:false, time:null },
      { id:13, name:'FDM', sub:'', person:'—', due:'下個月20號', dueDate:20, checked:false, time:null },
      { id:14, name:'Higg FEM Report', sub:'', person:'—', due:'下個月15號', dueDate:15, checked:false, time:null },
    ],
    quarterly: [
      { id:20, name:'Internal Assessment', sub:'內部評估', person:'—', due:'3/6/9/12月 15號前', checked:false, time:null },
      { id:21, name:'Sustainability CAP: DVS', sub:'永續改善計畫', person:'—', due:'每季季末', checked:false, time:null },
    ]
  };

  let data = JSON.parse(localStorage.getItem('sus_checklist_v2')) || JSON.parse(JSON.stringify(defaultData));
  let idCounter = 200;
  let editTarget = null; // { type, id }

  function save() { localStorage.setItem('sus_checklist_v2', JSON.stringify(data)); }

  // ── 時間格式 ──
  function formatTime(ts) {
    if (!ts) return null;
    const d = new Date(ts);
    const p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }

  // ── 狀態判斷 ──
  function getStatus(item) {
    if (!item.checked) {
      // 週報：判斷今天是否已過截止日
      if (item.dueDay !== undefined) {
        const now = new Date();
        const day = now.getDay(); // 0=Sun,1=Mon...5=Fri
        const hour = now.getHours();
        if (day > item.dueDay || (day === item.dueDay && hour >= item.dueHour)) {
          return 'overdue';
        }
        if (day === item.dueDay && hour >= item.dueHour - 2) return 'upcoming';
      }
      // 月報：判斷今天日期
      if (item.dueDate) {
        const now = new Date();
        const today = now.getDate();
        const month = now.getMonth();
        // 如果今天已超過上個月的截止日（即已進入下個月後超過截止日）
        if (today > item.dueDate) return 'overdue';
        if (today >= item.dueDate - 3) return 'upcoming';
      }
      return 'pending';
    }
    // 已打卡：判斷是否準時
    if (item.dueDay !== undefined && item.time) {
      const d = new Date(item.time);
      const day = d.getDay();
      const hour = d.getHours();
      if (day > item.dueDay || (day === item.dueDay && hour >= item.dueHour)) return 'overdue';
      return 'ontime';
    }
    if (item.dueDate && item.time) {
      const d = new Date(item.time);
      if (d.getDate() > item.dueDate) return 'overdue';
      return 'ontime';
    }
    return 'ontime';
  }

  const statusLabel = { pending:'待繳交', ontime:'✅ 準時', overdue:'⚠️ 逾期', upcoming:'⏰ 即將到期' };
  const statusClass = { pending:'pending', ontime:'ontime', overdue:'overdue', upcoming:'upcoming' };

  // ── 渲染 ──
  function renderAll() {
    ['weekly','monthly','quarterly'].forEach(renderSection);
    updateProgress();
    updateDateNow();
  }

  function renderSection(type) {
    const tbody = document.getElementById(type+'-tbody');
    const items = data[type];
    tbody.innerHTML = '';

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-hint">尚無項目</td></tr>`;
    } else {
      items.forEach(item => {
        const st = getStatus(item);
        const tr = document.createElement('tr');
        if (item.checked) tr.classList.add('checked-row');
        if (st === 'overdue' && !item.checked) tr.classList.add('overdue-row');

        const timeStr = formatTime(item.time);
        tr.innerHTML = `
          <td style="text-align:center">
            <div class="check-btn ${item.checked?'checked':''}" onclick="toggle('${type}',${item.id})">${item.checked?'✓':''}</div>
          </td>
          <td>
            <div class="item-name ${item.checked?'done':''}">${item.name}</div>
            ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
          </td>
          <td>
            <span class="person-badge" onclick="openModal('${type}',${item.id})">${item.person}</span>
          </td>
          <td class="due-cell ${st==='overdue'&&!item.checked?'overdue':st==='upcoming'?'soon':''}">${item.due}</td>
          <td><span class="status-badge ${statusClass[st]}">${statusLabel[st]}</span></td>
          <td class="time-cell ${timeStr?'':'empty'}">${timeStr||'—'}</td>
          <td><button class="del-btn" onclick="deleteItem('${type}',${item.id})">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // stats
    const total = items.length;
    const done = items.filter(i=>i.checked).length;
    const overdue = items.filter(i=>getStatus(i)==='overdue').length;
    const rate = total>0 ? Math.round(done/total*100) : 0;
    document.getElementById(type+'-stats').innerHTML = `
      <div class="stat-card blue"><div class="n">${total}</div><div class="l">總項目</div></div>
      <div class="stat-card green"><div class="n">${done}</div><div class="l">已完成</div></div>
      <div class="stat-card red"><div class="n">${total-done}</div><div class="l">待完成</div></div>
      <div class="stat-card orange"><div class="n">${overdue}</div><div class="l">逾期</div></div>
    `;
  }

  function updateProgress() {
    const all = [...data.weekly,...data.monthly,...data.quarterly];
    const total = all.length;
    const done = all.filter(i=>i.checked).length;
    const rate = total>0 ? Math.round(done/total*100) : 0;
    document.getElementById('progress-fill').style.width = rate+'%';
    document.getElementById('progress-pct').textContent = rate+'%';
    document.getElementById('progress-text').textContent = `整體完成進度（${done} / ${total}）`;
  }

  function updateDateNow() {
    const now = new Date();
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('date-now').textContent =
      `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${days[now.getDay()]}`;
  }

  // ── 打卡 ──
  function toggle(type, id) {
    const item = data[type].find(i=>i.id===id);
    if (!item) return;
    item.checked = !item.checked;
    item.time = item.checked ? Date.now() : null;
    save(); renderAll();
  }

  // ── 刪除 ──
  function deleteItem(type, id) {
    if (!confirm('確定要刪除此項目？')) return;
    data[type] = data[type].filter(i=>i.id!==id);
    save(); renderAll();
  }

  // ── 新增 ──
  function addItem(type) {
    const prefix = type==='weekly'?'w':type==='monthly'?'m':'q';
    const name = document.getElementById(prefix+'-name').value.trim();
    const person = document.getElementById(prefix+'-person').value.trim();
    const due = document.getElementById(prefix+'-due').value.trim();
    if (!name) { alert('請輸入項目名稱'); return; }
    data[type].push({ id:idCounter++, name, sub:'', person:person||'—', due:due||'—', checked:false, time:null });
    document.getElementById(prefix+'-name').value='';
    document.getElementById(prefix+'-person').value='';
    document.getElementById(prefix+'-due').value='';
    save(); renderAll();
  }

  // ── 重置 ──
  function resetSection(type) {
    if (!confirm(`確定要重置所有「${type==='weekly'?'週報':type==='monthly'?'月報':'季報'}」的打卡狀態嗎？`)) return;
    data[type].forEach(i=>{ i.checked=false; i.time=null; });
    save(); renderAll();
  }

  // ── 清除已完成 ──
  function clearChecked(type) {
    if (!confirm('確定要清除所有已完成的項目嗎？')) return;
    data[type] = data[type].filter(i=>!i.checked);
    save(); renderAll();
  }

  // ── 表單切換 ──
  function toggleForm(type) {
    document.getElementById(type+'-form').classList.toggle('open');
  }

  // ── 分頁切換 ──
  function switchTab(type, btn) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(type).classList.add('active');
    btn.classList.add('active');
  }

  // ── 編輯負責人 ──
  function openModal(type, id) {
    editTarget = { type, id };
    const item = data[type].find(i=>i.id===id);
    document.getElementById('modal-input').value = item.person==='—' ? '' : item.person;
    document.getElementById('modal').classList.add('open');
    setTimeout(()=>document.getElementById('modal-input').focus(), 100);
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editTarget = null;
  }
  function confirmModal() {
    if (!editTarget) return;
    const val = document.getElementById('modal-input').value.trim();
    const item = data[editTarget.type].find(i=>i.id===editTarget.id);
    if (item) { item.person = val || '—'; }
    save(); renderAll(); closeModal();
  }
  document.getElementById('modal-input').addEventListener('keydown', e=>{ if(e.key==='Enter') confirmModal(); if(e.key==='Escape') closeModal(); });
  document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

  renderAll();
  setInterval(updateDateNow, 60000);
</script>
</body>
</html>
